name: Docker Build Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Environment variables for Node.js 24 compatibility
env:
  NODE_OPTIONS: --openssl-legacy-provider

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: "Zabbix Server (PostgreSQL)"
            context: "./server-pgsql/alpine/"
            dockerfile: "./server-pgsql/alpine/Dockerfile"
            tag: "zabbix-server-pgsql:latest"
          
          - service: "Zabbix Web (Nginx+PostgreSQL)"
            context: "./web-nginx-pgsql/alpine/"
            dockerfile: "./web-nginx-pgsql/alpine/Dockerfile"
            tag: "zabbix-web-nginx-pgsql:latest"
          
          - service: "Zabbix Agent"
            context: "./agent/alpine/"
            dockerfile: "./agent/alpine/Dockerfile"
            tag: "zabbix-agent:latest"
    
    steps:
      - name: Checkout code (v4.1.1 - Node 20+ compatible)
        uses: actions/checkout@v4.1.1

      - name: Set up Docker Buildx (v3.1.0 - Node 20+ compatible)
        uses: docker/setup-buildx-action@v3.1.0

      - name: Build ${{ matrix.service }} Image (v5.2.0 - Node 20+ compatible)
        uses: docker/build-push-action@v5.2.0
        with:
          context: ${{ matrix.context }}
          push: false
          tags: ${{ matrix.tag }}
          dockerfile: ${{ matrix.dockerfile }}
          annotations: |
            org.opencontainers.image.vendor=Zabbix LLC
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
      
      - name: Build report
        if: always()
        run: |
          echo "Build Status: ${{ job.status }}"
          echo "Service: ${{ matrix.service }}"
          echo "Tag: ${{ matrix.tag }}"
