name: Zabbix Stack CI/CD

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  lint:
    name: Lint & Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Hadolint (Dockerfile Linter)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          ignore: DL3008

      - name: Run Yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: 'scripts'

      - name: Check JSON Validity
        run: |
          find . -name "*.json" -type f -not -path "./.git/*" -exec jq . {} + > /dev/null

      - name: Secret Scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-test:
    name: Build & Integration Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare environment
        run: |
          # Создаем рабочие конфиги из шаблонов
          cp .env_agent.example .env_agent
          cp .env_db_pgsql.example .env_db_pgsql
          cp .env_grafana.example .env_grafana
          cp .env_srv.example .env_srv
          cp .env_web.example .env_web
          
          # Безопасно инжектируем секреты GitHub в файлы, которые игнорируются git
          echo "${{ secrets.POSTGRES_USER }}" > .POSTGRES_USER
          echo "${{ secrets.POSTGRES_PASSWORD }}" > .POSTGRES_PASSWORD
          
          # Настраиваем хосты для связи контейнеров (из-за переименования сервисов)
          sed -i "s/postgres-server/postgres/g" .env_srv
          sed -i "s/postgres-server/postgres/g" .env_web
          sed -i "s/postgres-server/postgres/g" .env_grafana
          
          # Подставляем пароль Grafana из секретов
          sed -i "s/your_password/${{ secrets.GF_DATABASE_PASSWORD }}/g" .env_grafana
          
      - name: Validate Environment Templates
        run: bash scripts/validate_envs.sh

      - name: Validate Docker Compose Config
        run: docker compose config --quiet

      - name: Build Images
        run: docker compose build

      - name: Start Stack
        run: docker compose up -d

      - name: Wait for Services (Docker Healthchecks)
        run: |
          for i in {1..60}; do
            HEALTHY_COUNT=$(docker ps --filter "health=healthy" --quiet | wc -l)
            if [ "$HEALTHY_COUNT" == "4" ]; then
              echo "All core services are healthy!"
              exit 0
            fi
            echo "Waiting for services to become healthy... ($HEALTHY_COUNT/4)"
            docker ps --format "table {{.Names}}\t{{.Status}}"
            sleep 5
          done
          echo "Timeout waiting for services"
          docker ps -a
          exit 1

      - name: Database Schema Validation
        run: bash scripts/validate_db.sh

      - name: Zabbix API Readiness
        run: bash scripts/validate_api.sh

      - name: Clean up
        if: always()
        run: docker compose down
