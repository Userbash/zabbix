name: Docker CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - zabbix-server-pgsql
          - zabbix-web-nginx-pgsql
          - zabbix-agent
          - zabbix-agent2
          - zabbix-java-gateway
          - zabbix-snmptraps
          - postgres
          - grafana

    steps:
      - uses: actions/checkout@v4

      - name: Prepare secret files
        run: |
          echo "${{ secrets.POSTGRES_USER }}" > .POSTGRES_USER
          echo "${{ secrets.POSTGRES_PASSWORD }}" > .POSTGRES_PASSWORD
          # Create dummy env files if they don't exist to avoid build errors
          cp .env_db_pgsql.example .env_db_pgsql
          cp .env_srv.example .env_srv
          cp .env_web.example .env_web
          cp .env_grafana.example .env_grafana
          cp .env_agent.example .env_agent

      - name: Build Docker image for ${{ matrix.service }}
        run: docker compose build ${{ matrix.service }}

  code-analysis:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: "Run static analysis"
        run: |
          echo "Running static analysis..."

  push:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare secret files for push
        run: |
          echo "${{ secrets.POSTGRES_USER }}" > .POSTGRES_USER
          echo "${{ secrets.POSTGRES_PASSWORD }}" > .POSTGRES_PASSWORD
          cp .env_db_pgsql.example .env_db_pgsql
          cp .env_srv.example .env_srv
          cp .env_web.example .env_web
          cp .env_grafana.example .env_grafana
          cp .env_agent.example .env_agent

      - name: Build and push images
        run: |
          docker compose build
          # Note: Push logic depends on your registry setup and tagging strategy
          # docker compose push
