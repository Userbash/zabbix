name: Docker CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - zabbix-server-pgsql
          - zabbix-web-nginx-pgsql
          - zabbix-agent
          - zabbix-agent2
          - zabbix-java-gateway
          - zabbix-snmptraps
          - postgres
          - grafana

    steps:
      - uses: actions/checkout@v3

      - name: Build Docker image for ${{ matrix.service }}
        run: docker compose build ${{ matrix.service }}

  code-analysis:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3
      - name: "Run static analysis"
        run: |
          echo "Running static analysis..."
