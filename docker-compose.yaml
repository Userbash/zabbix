# ==============================================================================
# Zabbix Docker Compose Configuration
# ==============================================================================
# This file defines all services for the Zabbix monitoring stack.
#
# SECURITY NOTES:
# - All sensitive credentials are stored in Docker Secrets (defined below)
# - Environment files (.env_*) contain non-sensitive configuration
# - Secret files (.POSTGRES_*, .GF_*) must be created via init-secrets.sh
# - Never commit actual passwords to version control!
#
# USAGE:
# 1. Copy environment templates: cp .env_*.example .env_*
# 2. Setup secrets: cp .POSTGRES_*.example .POSTGRES_* (or use init-secrets.sh)
# 3. Start services: docker compose up -d
# 4. View logs: docker compose logs -f
#
# FOR PODMAN:
# Replace "docker compose" with "podman-compose" in all commands
#
# ==============================================================================

services:
  zabbix-server-pgsql:
    build:
      context: ./server-pgsql/alpine
      cache_from:
        - alpine:3.20
    image: zabbix-server-pgsql:alpine-local
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    ports:
      - "10051:10051"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro 
      - ./zbx_env/usr/lib/zabbix/alertscripts:/usr/lib/zabbix/alertscripts:ro,z
      - ./zbx_env/usr/lib/zabbix/externalscripts:/usr/lib/zabbix/externalscripts:ro,z
      - ./zbx_env/var/lib/zabbix/export:/var/lib/zabbix/export:rw,z
      - ./zbx_env/var/lib/zabbix/modules:/var/lib/zabbix/modules:ro,z
      - ./zbx_env/var/lib/zabbix/enc:/var/lib/zabbix/enc:ro,z
      - ./zbx_env/var/lib/zabbix/ssh_keys:/var/lib/zabbix/ssh_keys:ro,z
      - ./zbx_env/var/lib/zabbix/mibs:/var/lib/zabbix/mibs:ro,z
      - ./zbx_env/var/lib/zabbix/snmptraps:/var/lib/zabbix/snmptraps:ro,z
    env_file:
      - .env_db_pgsql
      - .env_srv
    secrets:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
    depends_on:
      - postgres
      - zabbix-java-gateway
      - zabbix-snmptraps
    networks:
      zbx_net_backend:
        aliases:
          - zabbix-server
          - zabbix-server-pgsql
          - zabbix-server-alpine-pgsql
          - zabbix-server-pgsql-alpine
      zbx_net_frontend:
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "10051"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    stop_grace_period: 30s
    sysctls:
      - net.ipv4.ip_local_port_range=1024 65000
      - net.ipv4.conf.all.accept_redirects=0
      - net.ipv4.conf.all.secure_redirects=0
      - net.ipv4.conf.all.send_redirects=0
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'
        labels: 'service=zabbix-server-pgsql'
    labels:
      com.zabbix.description: "Zabbix server with PostgreSQL database support"
      com.zabbix.company: "Zabbix LLC"
      com.zabbix.component: "zabbix-server"
      com.zabbix.dbtype: "pgsql"
      com.zabbix.os: "alpine"

  zabbix-web-nginx-pgsql:
    build:
      context: ./web-nginx-pgsql/alpine
      cache_from:
        - alpine:3.20
    image: zabbix-web-nginx-pgsql:alpine-local
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    ports:
      - "80:8080"
      - "443:8443"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - ./zbx_env/etc/ssl/nginx:/etc/ssl/nginx:ro,z
      - ./zbx_env/usr/share/zabbix/modules/:/usr/share/zabbix/modules/:ro,z
    env_file:
      - .env_db_pgsql
      - .env_web
    secrets:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
    depends_on:
      - postgres
      - zabbix-server-pgsql
    networks:
      zbx_net_backend:
        aliases:
          - zabbix-web-nginx-pgsql
          - zabbix-web-nginx-alpine-pgsql
          - zabbix-web-nginx-pgsql-alpine
      zbx_net_frontend:
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    stop_grace_period: 10s
    sysctls:
      - net.core.somaxconn=65535
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'
        labels: 'service=zabbix-web-nginx-pgsql'
    labels:
      com.zabbix.description: "Zabbix frontend on Nginx web-server with PostgreSQL database support"
      com.zabbix.company: "Zabbix LLC"
      com.zabbix.component: "zabbix-frontend"
      com.zabbix.webserver: "nginx"
      com.zabbix.dbtype: "pgsql"
      com.zabbix.os: "alpine"

  zabbix-agent:
    build:
      context: ./agent/alpine
      cache_from:
        - alpine:3.20
    image: zabbix-agent:alpine-local
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 128M
    ports:
      - "10050:10050"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - ./zbx_env/etc/zabbix/zabbix_agentd.d:/etc/zabbix/zabbix_agentd.d:ro,z
      - ./zbx_env/var/lib/zabbix/modules:/var/lib/zabbix/modules:ro,z
      - ./zbx_env/var/lib/zabbix/enc:/var/lib/zabbix/enc:ro,z
      - ./zbx_env/var/lib/zabbix/ssh_keys:/var/lib/zabbix/ssh_keys:ro,z
    networks:
      zbx_net_frontend:
        aliases:
          - zabbix-agent
          - zabbix-agent-passive
          - zabbix-agent-alpine
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "10050"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: '5m'
        max-file: '3'
        labels: 'service=zabbix-agent'
    stop_grace_period: 5s
    labels:
      com.zabbix.description: "Zabbix agent"
      com.zabbix.company: "Zabbix LLC"
      com.zabbix.component: "zabbix-agentd"
      com.zabbix.os: "alpine"

  zabbix-agent2:
    build:
      context: ./agent2/alpine
      cache_from:
        - alpine:3.20
    image: zabbix-agent2:alpine-local
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M
    ports:
      - "10049:10050"
      - "31999:31999"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - ./zbx_env/etc/zabbix/zabbix_agent2.d:/etc/zabbix/zabbix_agent2.d:ro,z
      - ./zbx_env/var/lib/zabbix/enc:/var/lib/zabbix/enc:ro,z
    networks:
      zbx_net_frontend:
        aliases:
          - zabbix-agent2
          - zabbix-agent2-alpine
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "10050"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: '5m'
        max-file: '3'
        labels: 'service=zabbix-agent2'
    stop_grace_period: 5s
    labels:
      com.zabbix.description: "Zabbix agent 2"
      com.zabbix.company: "Zabbix LLC"
      com.zabbix.component: "zabbix-agent2"
      com.zabbix.os: "alpine"

  zabbix-java-gateway:
    build:
      context: ./java-gateway/alpine
      cache_from:
        - alpine:3.20
    image: zabbix-java-gateway:alpine-local
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 512M
    ports:
      - "10052:10052"
    networks:
      zbx_net_backend:
        aliases:
          - zabbix-java-gateway
          - zabbix-java-gateway-alpine
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "10052"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: '5m'
        max-file: '3'
        labels: 'service=zabbix-java-gateway'
    stop_grace_period: 5s
    labels:
      com.zabbix.description: "Zabbix Java Gateway"
      com.zabbix.company: "Zabbix LLC"
      com.zabbix.component: "java-gateway"
      com.zabbix.os: "alpine"

  zabbix-snmptraps:
    build:
      context: ./snmptraps/alpine
      cache_from:
        - alpine:3.20
    image: zabbix-snmptraps:alpine-local
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 128M
    ports:
      - "162:1162/udp"
    volumes:
      - snmptraps:/var/lib/zabbix/snmptraps:rw,z
    networks:
      zbx_net_frontend:
        aliases:
          - zabbix-snmptraps
      zbx_net_backend:
    healthcheck:
      test: ["CMD", "test", "-S", "/var/run/zabbix/zabbix_snmptraps.sock"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: '5m'
        max-file: '3'
        labels: 'service=zabbix-snmptraps'
    stop_grace_period: 5s
    labels:
      com.zabbix.description: "Zabbix snmptraps"
      com.zabbix.company: "Zabbix LLC"
      com.zabbix.component: "snmptraps"
      com.zabbix.os: "alpine"

  grafana:
    build: ./grafana
    container_name: grafana
    hostname: grafana
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    volumes:
      - ./zbx_env/etc/grafana:/etc/grafana:rw,z
      - ./zbx_env/etc/grafana/provisioning:/etc/grafana/provisioning:rw,z
      - ./zbx_env/var/lib/grafana:/var/lib/grafana:rw,z
      - ./zbx_env/var/lib/grafana/plugins:/var/lib/grafana/plugins:rw,z
    env_file:
      - .env_grafana
    environment:
      GF_DATABASE_USER__FILE: /run/secrets/GF_DATABASE_USER
      GF_DATABASE_PASSWORD__FILE: /run/secrets/GF_DATABASE_PASSWORD
      GF_SESSION_PROVIDER_CONFIG__FILE: /run/secrets/GF_SESSION_PROVIDER_CONFIG
    secrets:
      - GF_DATABASE_USER
      - GF_DATABASE_PASSWORD
      - GF_SESSION_PROVIDER_CONFIG
    ports:
      - "3000:3000"  
    depends_on:
      - postgres
    networks:
      zbx_net_backend:
        aliases:
          - grafana-server
      zbx_net_frontend: 
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
        labels: 'service=grafana'

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    hostname: postgres
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    volumes:
      - ./zbx_env/var/lib/postgresql/data:/var/lib/postgresql/data:rw,z
      - ./zbx_env/var/lib/postgresql/initdb/01-grafana.sh:/docker-entrypoint-initdb.d/01-grafana.sh:ro,z
    env_file:
      - .env_db_pgsql
      - .env_grafana
    environment:
      GF_DATABASE_USER_FILE: /run/secrets/GF_DATABASE_USER
      GF_DATABASE_PASSWORD_FILE: /run/secrets/GF_DATABASE_PASSWORD
    secrets:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - GF_DATABASE_USER
      - GF_DATABASE_PASSWORD
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB && [ \"$$(psql -U $$POSTGRES_USER -d $$POSTGRES_DB -tAc \"SELECT 1 FROM information_schema.tables WHERE table_schema='public' AND table_name='hosts';\")\" = '1' ]"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'
        labels: 'service=postgres'
    stop_grace_period: 1m
    networks:
      zbx_net_backend:
        aliases:
          - postgres-server
          - pgsql-server
          - pgsql-database

  db_data_pgsql:
    image: busybox
    volumes:
      - ./zbx_env/var/lib/postgresql/data:/var/lib/postgresql/data:rw,z

networks:
  zbx_net_frontend:
    driver: bridge
    driver_opts:
      com.docker.network.enable_ipv6: "false"
    ipam:
      driver: default
      config:
        - subnet: 172.16.238.0/24
  zbx_net_backend:
    driver: bridge
    driver_opts:
      com.docker.network.enable_ipv6: "false"
    internal: true
    ipam:
      driver: default
      config:
        - subnet: 172.16.239.0/24

volumes:
  snmptraps:

secrets:
  POSTGRES_USER:
    file: ./.POSTGRES_USER
  POSTGRES_PASSWORD:
    file: ./.POSTGRES_PASSWORD
  GF_DATABASE_USER:
    file: ./.GF_DATABASE_USER
  GF_DATABASE_PASSWORD:
    file: ./.GF_DATABASE_PASSWORD
  GF_SESSION_PROVIDER_CONFIG:
    file: ./.GF_SESSION_PROVIDER_CONFIG
